<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDo Personal App</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #222222;
      --muted: #666666;
      --border: #dddddd;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --danger: #b91c1c;
      --success: #15803d;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 640px) {
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea, button {
      width: 100%;
      font: inherit;
      border-radius: 10px;
    }

    input, select, textarea {
      border: 1px solid var(--border);
      padding: 12px;
      background: #fff;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    button {
      border: 0;
      padding: 12px 14px;
      cursor: pointer;
      min-height: 44px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary {
      background: #e7e7e7;
      color: var(--text);
    }

    .toolbar {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      margin-bottom: 16px;
    }

    @media (min-width: 640px) {
      .toolbar {
        grid-template-columns: 1fr 200px 180px;
        align-items: end;
      }
    }

    .status {
      font-size: 14px;
      color: var(--muted);
      margin-top: 10px;
    }

    .task-list {
      display: grid;
      gap: 12px;
    }

    .task-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      background: #fff;
    }

    .task-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .task-title {
      margin: 0;
      font-size: 18px;
    }

    .task-title.done {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-meta {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .task-note {
      margin-top: 8px;
      font-size: 14px;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .task-actions button {
      width: auto;
      padding: 10px 12px;
    }

    .done-badge,
    .late-badge,
    .soon-badge {
      display: inline-block;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      margin-top: 8px;
      font-weight: bold;
    }

    .done-badge { background: #dcfce7; color: var(--success); }
    .late-badge { background: #fee2e2; color: var(--danger); }
    .soon-badge { background: #fef3c7; color: #92400e; }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Todo Simples</h1>
    <p class="subtitle">Adicione tarefas e receba um lembrete perto do horário.</p>

    <section class="card">
      <div class="grid two">
        <div>
          <label for="title">Título</label>
          <input id="title" type="text" placeholder="Ex.: reunião com cliente" />
        </div>
        <div>
          <label for="reminder">Lembrar com antecedência</label>
          <select id="reminder">
            <option value="0">No horário</option>
            <option value="10">10 minutos antes</option>
            <option value="30">30 minutos antes</option>
            <option value="60">1 hora antes</option>
          </select>
        </div>
      </div>

      <div class="grid two" style="margin-top:12px;">
        <div>
          <label for="date">Data</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label for="time">Hora</label>
          <input id="time" type="time" />
        </div>
      </div>

      <div style="margin-top:12px;">
        <label for="note">Observação</label>
        <textarea id="note" placeholder="Opcional"></textarea>
      </div>

      <div class="grid two" style="margin-top:12px;">
        <button id="saveBtn" class="btn-primary">Salvar tarefa</button>
        <button id="notifyBtn" class="btn-secondary">Ativar notificações</button>
      </div>

      <p id="notifyStatus" class="status">Status das notificações: não verificado.</p>
    </section>

    <section class="card">
      <div class="toolbar">
        <div>
          <label for="search">Buscar</label>
          <input id="search" type="text" placeholder="Buscar por título" />
        </div>
        <div>
          <label for="filter">Filtro</label>
          <select id="filter">
            <option value="all">Todas</option>
            <option value="pending">Pendentes</option>
            <option value="done">Concluídas</option>
          </select>
        </div>
        <button id="clearDone" class="btn-secondary">Limpar concluídas</button>
      </div>

      <div id="taskList" class="task-list"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'todo-simples-tasks';
    const titleEl = document.getElementById('title');
    const dateEl = document.getElementById('date');
    const timeEl = document.getElementById('time');
    const noteEl = document.getElementById('note');
    const reminderEl = document.getElementById('reminder');
    const saveBtn = document.getElementById('saveBtn');
    const notifyBtn = document.getElementById('notifyBtn');
    const notifyStatus = document.getElementById('notifyStatus');
    const taskList = document.getElementById('taskList');
    const filterEl = document.getElementById('filter');
    const searchEl = document.getElementById('search');
    const clearDoneBtn = document.getElementById('clearDone');

    let tasks = [];

    function loadTasks() {
      try {
        tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch {
        tasks = [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function formatDateTime(dateString) {
      const date = new Date(dateString);
      return new Intl.DateTimeFormat('pt-BR', {
        dateStyle: 'short',
        timeStyle: 'short'
      }).format(date);
    }

    function getDueDate(task) {
      return new Date(`${task.date}T${task.time}`);
    }

    function renderTasks() {
      const filter = filterEl.value;
      const search = searchEl.value.trim().toLowerCase();
      const now = new Date();

      const visible = tasks
        .filter(task => filter === 'all' ? true : filter === 'done' ? task.done : !task.done)
        .filter(task => task.title.toLowerCase().includes(search))
        .sort((a, b) => getDueDate(a) - getDueDate(b));

      if (!visible.length) {
        taskList.innerHTML = '<div class="empty">Nenhuma tarefa encontrada.</div>';
        return;
      }

      taskList.innerHTML = visible.map(task => {
        const due = getDueDate(task);
        const isLate = !task.done && due < now;
        const minsLeft = Math.round((due - now) / 60000);
        const isSoon = !task.done && minsLeft >= 0 && minsLeft <= 60;

        return `
          <article class="task-item">
            <div class="task-top">
              <div>
                <h2 class="task-title ${task.done ? 'done' : ''}">${escapeHtml(task.title)}</h2>
                <div class="task-meta">${formatDateTime(`${task.date}T${task.time}`)} · lembrete ${task.reminder} min antes</div>
                ${task.note ? `<div class="task-note">${escapeHtml(task.note)}</div>` : ''}
                ${task.done ? '<span class="done-badge">Concluída</span>' : ''}
                ${isLate ? '<span class="late-badge">Atrasada</span>' : ''}
                ${isSoon ? '<span class="soon-badge">Acontece em breve</span>' : ''}
              </div>
            </div>
            <div class="task-actions">
              <button class="btn-secondary" onclick="toggleTask('${task.id}')">${task.done ? 'Reabrir' : 'Concluir'}</button>
              <button class="btn-secondary" onclick="editTask('${task.id}')">Editar</button>
              <button class="btn-secondary" onclick="removeTask('${task.id}')">Excluir</button>
            </div>
          </article>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function resetForm() {
      titleEl.value = '';
      dateEl.value = '';
      timeEl.value = '';
      noteEl.value = '';
      reminderEl.value = '0';
      saveBtn.dataset.editing = '';
      saveBtn.textContent = 'Salvar tarefa';
    }

    function updateNotificationStatus() {
      if (!('Notification' in window)) {
        notifyStatus.textContent = 'Status das notificações: navegador não suporta.';
        return;
      }
      if (Notification.permission === 'granted') {
        notifyStatus.textContent = 'Status das notificações: permitido.';
      } else if (Notification.permission === 'denied') {
        notifyStatus.textContent = 'Status das notificações: bloqueado.';
      } else {
        notifyStatus.textContent = 'Status das notificações: aguardando permissão.';
      }
    }

    async function askNotificationPermission() {
      if (!('Notification' in window)) {
        alert('Este navegador não suporta notificações.');
        updateNotificationStatus();
        return;
      }
      const permission = await Notification.requestPermission();
      updateNotificationStatus();
      if (permission === 'granted') {
        new Notification('Notificações ativadas', {
          body: 'Você receberá lembretes das suas tarefas.'
        });
      }
    }

    function maybeNotify(task) {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted') return;
      if (task.done) return;
      if (task.notified) return;

      const due = getDueDate(task).getTime();
      const remindAt = due - (Number(task.reminder) * 60000);
      const now = Date.now();

      if (now >= remindAt && now <= due + 60000) {
        new Notification('Lembrete de tarefa', {
          body: `${task.title} em ${formatDateTime(`${task.date}T${task.time}`)}`
        });
        task.notified = true;
        saveTasks();
        renderTasks();
      }
    }

    function checkReminders() {
      tasks.forEach(maybeNotify);
    }

    function addOrUpdateTask() {
      const title = titleEl.value.trim();
      const date = dateEl.value;
      const time = timeEl.value;
      const note = noteEl.value.trim();
      const reminder = Number(reminderEl.value);

      if (!title || !date || !time) {
        alert('Preencha título, data e hora.');
        return;
      }

      const editingId = saveBtn.dataset.editing;

      if (editingId) {
        tasks = tasks.map(task => task.id === editingId ? {
          ...task,
          title,
          date,
          time,
          note,
          reminder,
          notified: false
        } : task);
      } else {
        tasks.push({
          id: crypto.randomUUID(),
          title,
          date,
          time,
          note,
          reminder,
          done: false,
          notified: false
        });
      }

      saveTasks();
      renderTasks();
      resetForm();
    }

    window.toggleTask = function(id) {
      tasks = tasks.map(task => task.id === id ? { ...task, done: !task.done } : task);
      saveTasks();
      renderTasks();
    }

    window.removeTask = function(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      renderTasks();
    }

    window.editTask = function(id) {
      const task = tasks.find(task => task.id === id);
      if (!task) return;
      titleEl.value = task.title;
      dateEl.value = task.date;
      timeEl.value = task.time;
      noteEl.value = task.note || '';
      reminderEl.value = String(task.reminder);
      saveBtn.dataset.editing = id;
      saveBtn.textContent = 'Atualizar tarefa';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    clearDoneBtn.addEventListener('click', () => {
      tasks = tasks.filter(task => !task.done);
      saveTasks();
      renderTasks();
    });

    saveBtn.addEventListener('click', addOrUpdateTask);
    notifyBtn.addEventListener('click', askNotificationPermission);
    filterEl.addEventListener('change', renderTasks);
    searchEl.addEventListener('input', renderTasks);

    loadTasks();
    renderTasks();
    updateNotificationStatus();
    checkReminders();
    setInterval(checkReminders, 30000);
  </script>
</body>
</html>
